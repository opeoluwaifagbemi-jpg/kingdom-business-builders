<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1F3A33;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { max-width: 600px; width: 100%; }
    .login-box {
      background: #FBF6EC;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }
    .admin-panel {
      background: #FBF6EC;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      display: none;
    }
    .admin-panel.show { display: block; }
    h1 { color: #1F3A33; margin-bottom: 24px; text-align: center; font-size: 28px; }
    h2 { color: #1F3A33; margin-bottom: 20px; font-size: 20px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 700; color: #333; margin-bottom: 8px; font-size: 14px; }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, select:focus { outline: none; border-color: #4FA992; }
    button {
      width: 100%;
      padding: 14px;
      background: #4FA992;
      color: #FBF6EC;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3F8A78; }
    button.secondary {
      background: #f0f0f0;
      color: #333;
      margin-top: 8px;
    }
    button.secondary:hover { background: #e0e0e0; }
    .error { color: #C2452E; font-size: 13px; margin-bottom: 12px; display: none; }
    .error.show { display: block; }
    .success { color: #1F6F5C; font-size: 13px; margin-top: 12px; display: none; }
    .success.show { display: block; }
    .preview {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
      font-size: 13px;
      line-height: 1.6;
      color: #333;
    }
    .preview strong { color: #1F3A33; }
    .loading { color: #999; font-size: 13px; margin-top: 8px; }
    .logout-btn { background: #E2654B !important; }
    .logout-btn:hover { background: #CC543B !important; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #4FA992;
      text-decoration: none;
      font-weight: 700;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <h1>⚙️ Admin Panel</h1>
    <div class="error" id="loginError"></div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="Enter password" onkeypress="if(event.key==='Enter') verifyPassword()">
    </div>
    <button onclick="verifyPassword()">Login</button>
    <a href="index.html" class="back-link">← Back to Site</a>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="adminPanel">
    <h1>🎯 Select Spotlight Business</h1>

    <div class="form-group">
      <label>Choose Business</label>
      <select id="businessSelect" onchange="updatePreview()">
        <option value="">Loading businesses...</option>
      </select>
      <div class="loading" id="loadingStatus"></div>
    </div>

    <div class="form-group">
      <label>Business Image (optional)</label>
      <input type="file" id="businessImage" accept="image/*" onchange="startImageCrop()">
      <div id="imagePreview" style="margin-top: 12px; max-width: 100%; border-radius: 8px; overflow: hidden;"></div>
      <div id="cropContainer" style="display: none; margin-top: 12px;">
        <canvas id="cropCanvas" style="max-width: 100%; border: 2px solid #ddd; border-radius: 8px;"></canvas>
        <div style="margin-top: 12px; display: flex; gap: 10px;">
          <button type="button" onclick="cropImage()" style="flex: 1; padding: 10px; background: #4FA992; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">✓ Use This Crop</button>
          <button type="button" onclick="resetCrop()" style="flex: 1; padding: 10px; background: #f0f0f0; color: #333; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Reset</button>
        </div>
        <div style="margin-top: 8px; font-size: 12px; color: #666;">Drag to move • Scroll to zoom • Click Use when ready</div>
      </div>
    </div>

    <div class="preview" id="businessPreview"></div>

    <button onclick="saveSpotlight()" style="margin-top: 20px;">💾 Save as Spotlight</button>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <div class="success" id="successMsg">✅ Spotlight saved!</div>

    <a href="index.html" class="back-link">← View Live Site</a>
  </div>
</div>

<script>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlkd2J5ZWlsaGRlY3JnZXpvZ3FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNTg5NjAsImV4cCI6MjA5NzgzNDk2MH0.V3zGn_eiEA8-rC-FhwBrDHFlbAignjg3bWrvPLtxAN0';

let allBusinesses = [];
let selectedBusiness = null;

function getWeekKey() {
  const now = new Date();
  const year = now.getFullYear();
  const startDate = new Date(year, 0, 1);
  const days = Math.floor((now - startDate) / (24 * 60 * 60 * 1000));
  const week = Math.ceil((days + startDate.getDay() + 1) / 7);
  return year + '-W' + String(week).padStart(2, '0');
}

const WEEK_KEY = getWeekKey();

function verifyPassword() {
  const pwd = document.getElementById('adminPassword').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').classList.add('show');
    document.getElementById('adminPassword').value = '';

  } else {
    const err = document.getElementById('loginError');
    err.textContent = '❌ Incorrect password';
    err.classList.add('show');
    setTimeout(() => err.classList.remove('show'), 3000);
  }
}

function logout() {
  document.getElementById('adminPanel').classList.remove('show');
  document.getElementById('loginBox').style.display = 'block';

}

function getVerseByCategory(category) {
  const cat = (category || '').toLowerCase();
  const verses = {

    'real estate': { ref: 'Proverbs 24:3-4', text: 'By wisdom a house is built, and by understanding it is established.' },
    'beauty': { ref: 'Psalm 139:14', text: 'I praise you because I am fearfully and wonderfully made.' },

    'health': { ref: '3 John 1:2', text: 'Dear friend, I pray that you may enjoy good health and that all may go well with you.' },
    'autism': { ref: 'Proverbs 22:6', text: 'Train up a child in the way they should go; even when old, they will not depart from it.' },

    `Father, we pray for the team at ${business.name}. Give them strength, integrity, and favor in all they do. Help them impact their community for good.`,
    `God, we commit ${business.name} into Your hands. Provide for their needs, open doors for growth, and guide them with Your wisdom. Bless their efforts today.`,
    `Almighty God, watch over ${business.name}. Guide the owners and workers with Your wisdom. May their enterprise succeed and glorify Your name in all they do.`
  ];
  return prayers[Math.floor(Math.random() * prayers.length)];
}

async function sbFetch(path, opts = {}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    ...(opts.prefer ? { 'Prefer': opts.prefer } : {}),
    ...opts.headers
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...opts,
    headers
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204 || res.headers.get('content-length') === '0') return null;
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function saveSpotlight() {
  if (!selectedBusiness) {
    alert('Please select a business');
    return;
  }

  try {
    const verse = getVerseByCategory(selectedBusiness.category);
    const prayer = generatePrayer(selectedBusiness);

    let imageUrl = null;

    // Use cropped image if available
    if (window.selectedImageData) {
      imageUrl = window.selectedImageData;
    }

    const spotlightData = {
      week_key: WEEK_KEY,
      business_name: selectedBusiness.name,
      business_category: selectedBusiness.category,
      business_location: selectedBusiness.location || 'Location TBD',
      bible_verse: verse.ref,
      bible_text: verse.text,
      prayer_text: prayer,
      image_url: imageUrl
    };

    // First delete any existing record for this week
    try {
      const wk = encodeURIComponent(WEEK_KEY);
      await fetch(`${SUPABASE_URL}/rest/v1/spotlight_business?week_key=eq.${wk}`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        }
      });
    } catch(e) {
      console.log('No existing record to delete');
    }

    // Then insert the new record
    const res = await fetch(`${SUPABASE_URL}/rest/v1/spotlight_business`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(spotlightData)
    });

    if (!res.ok) throw new Error(await res.text());

    document.getElementById('successMsg').classList.add('show');
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  } catch(e) {
    console.error('Save error:', e);
    alert('❌ Error saving: ' + e.message);
  }
}

document.getElementById('adminPassword').focus();

let cropState = {
  image: null,
  offsetX: 0,
  offsetY: 0,
  zoom: 1,
  isDragging: false,
  lastX: 0,
  lastY: 0
};

function startImageCrop() {
  const file = document.getElementById('businessImage').files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      cropState.image = img;
      cropState.offsetX = 0;
      cropState.offsetY = 0;
      cropState.zoom = 1;
      drawCropCanvas();
      document.getElementById('cropContainer').style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawCropCanvas() {
  const canvas = document.getElementById('cropCanvas');
  const ctx = canvas.getContext('2d');
  const img = cropState.image;

  // Set canvas size
  canvas.width = 400;
  canvas.height = 300;

  // Clear canvas
  ctx.fillStyle = '#f0f0f0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw image
  const w = img.width * cropState.zoom;
  const h = img.height * cropState.zoom;
  ctx.drawImage(img, cropState.offsetX, cropState.offsetY, w, h);

  // Draw crop box (golden rectangle)
  ctx.strokeStyle = '#c4900a';
  ctx.lineWidth = 3;
  ctx.strokeRect(50, 30, 300, 240);

  // Draw corner indicators
  ctx.fillStyle = '#c4900a';
  for (let x of [50, 350]) {
    for (let y of [30, 270]) {
      ctx.fillRect(x - 5, y - 5, 10, 10);
    }
  }
}

function cropImage() {
  const canvas = document.getElementById('cropCanvas');
  const ctx = canvas.getContext('2d');

  // Create output canvas with crop area
  const output = document.createElement('canvas');
  output.width = 300;
  output.height = 240;
  const outCtx = output.getContext('2d');

  // Copy cropped area
  const imgData = ctx.getImageData(50, 30, 300, 240);
  outCtx.putImageData(imgData, 0, 0);

  // Convert to compressed base64
  const croppedImage = output.toDataURL('image/jpeg', 0.85);
  window.selectedImageData = croppedImage;

  document.getElementById('cropContainer').style.display = 'none';
  document.getElementById('imagePreview').innerHTML = `<img src="${croppedImage}" style="width: 100%; height: auto; border-radius: 8px;">`;
}

function resetCrop() {
  cropState.offsetX = 0;
  cropState.offsetY = 0;
  cropState.zoom = 1;
  drawCropCanvas();
}

// Canvas interaction
document.addEventListener('DOMContentLoaded', () => {
  const canvas = document.getElementById('cropCanvas');
  if (!canvas) return;

  canvas.addEventListener('mousedown', (e) => {
    cropState.isDragging = true;
    cropState.lastX = e.clientX;
    cropState.lastY = e.clientY;
  });

  canvas.addEventListener('mousemove', (e) => {
    if (!cropState.isDragging) return;
    const dx = e.clientX - cropState.lastX;
    const dy = e.clientY - cropState.lastY;
    cropState.offsetX += dx;
    cropState.offsetY += dy;
    cropState.lastX = e.clientX;
    cropState.lastY = e.clientY;
    drawCropCanvas();
  });

  canvas.addEventListener('mouseup', () => {
    cropState.isDragging = false;
  });

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoom = e.deltaY > 0 ? 0.9 : 1.1;
    cropState.zoom *= zoom;
    cropState.zoom = Math.max(0.5, Math.min(3, cropState.zoom));
    drawCropCanvas();
  });
});

async function uploadImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      resolve(e.target.result); // Return base64 data URL
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
